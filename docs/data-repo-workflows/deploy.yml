# COPY into your PRIVATE data repo at .github/workflows/deploy.yml
#
# Thin caller — deploys the grocery-mcp Worker from the upstream code repo using
# YOUR wrangler.jsonc (committed to this data repo) + your CLOUDFLARE_API_TOKEN
# secret. Runs entirely in your private repo; the public code repo holds no
# secrets. Trigger manually, or automatically when you change your config.
name: Deploy Worker

on:
  workflow_dispatch: {}
  push:
    branches: [main]
    paths:
      - wrangler.jsonc

jobs:
  deploy:
    uses: caseyWebb/groceries-agent/.github/workflows/data-deploy.yml@main
    secrets: inherit # passes CLOUDFLARE_API_TOKEN
    with:
      config_path: wrangler.jsonc
      # code_ref: main   # pin to a tag/sha to control when you take upstream updates
