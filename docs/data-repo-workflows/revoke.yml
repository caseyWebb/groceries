# COPY into your PRIVATE data repo at .github/workflows/revoke.yml
#
# Thin caller — removes a member's allowlist entry + invite code from KV, so they
# can no longer authorize and their issued OAuth token stops resolving. Runs in
# your PRIVATE data repo.
#
# Set these on the data repo first (Settings → Secrets and variables → Actions):
#   Secret: CLOUDFLARE_API_TOKEN
#   Variable: TENANT_KV_ID  (your TENANT_KV namespace id)
name: Revoke member

on:
  workflow_dispatch:
    inputs:
      username:
        description: "Username to revoke"
        required: true
      invite_code:
        description: "Their invite code to delete (optional)"
        required: false

jobs:
  revoke:
    uses: caseyWebb/groceries-agent/.github/workflows/data-revoke.yml@main
    secrets: inherit # passes CLOUDFLARE_API_TOKEN
    with:
      username: ${{ inputs.username }}
      invite_code: ${{ inputs.invite_code }}
      tenant_kv_id: ${{ vars.TENANT_KV_ID }}
