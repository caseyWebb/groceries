name: Onboard member

# Operator-run provisioning (no local tooling). Mints a member's invite code +
# allowlist entry in KV AND seeds their users/<username>/ subtree in the data repo.
# Run from this (forked) repo's Actions tab. workflow_dispatch is restricted to
# users with write access, so only the operator can run it.
#
# One-time setup on the fork:
#   - Secret  CLOUDFLARE_API_TOKEN   (also used by Deploy Worker)
#   - Secret  GH_APP_PRIVATE_KEY     (the GitHub App PEM — same key as the Worker)
#   - Enable Actions on the fork
# Everything else (App id, data-repo coords, KV binding) is read from wrangler.jsonc.

on:
  workflow_dispatch:
    inputs:
      username:
        description: "New member's username (their tenant id + users/<username> subtree)"
        required: true
      invite_code:
        description: "Invite code to mint (leave blank to generate a random one)"
        required: false

jobs:
  onboard:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Read config from wrangler.jsonc
        id: cfg
        run: |
          node -e '
            const fs = require("fs");
            let raw = fs.readFileSync("wrangler.jsonc", "utf8")
              .replace(/\/\*[\s\S]*?\*\//g, "")                 // block comments
              .split("\n").map((l) => l.replace(/^\s*\/\/.*$/, "")).join("\n") // line comments
              .replace(/,(\s*[}\]])/g, "$1");                   // trailing commas
            const v = JSON.parse(raw).vars;
            const out = process.env.GITHUB_OUTPUT;
            fs.appendFileSync(out, `app_id=${v.GITHUB_APP_ID}\n`);
            fs.appendFileSync(out, `data_owner=${v.DATA_OWNER}\n`);
            fs.appendFileSync(out, `data_repo=${v.DATA_REPO}\n`);
          '

      - name: Resolve invite code
        id: code
        run: |
          code="${{ inputs.invite_code }}"
          if [ -z "$code" ]; then code="$(openssl rand -hex 8)"; fi
          echo "value=$code" >> "$GITHUB_OUTPUT"

      - name: Mint a data-repo write token (GitHub App)
        id: apptoken
        uses: actions/create-github-app-token@v1
        with:
          app-id: ${{ steps.cfg.outputs.app_id }}
          private-key: ${{ secrets.GH_APP_PRIVATE_KEY }}
          owner: ${{ steps.cfg.outputs.data_owner }}
          repositories: ${{ steps.cfg.outputs.data_repo }}

      - name: Seed users/<username>/ in the data repo
        env:
          U: ${{ inputs.username }}
          OWNER: ${{ steps.cfg.outputs.data_owner }}
          REPO: ${{ steps.cfg.outputs.data_repo }}
          TOKEN: ${{ steps.apptoken.outputs.token }}
        run: |
          git clone --depth 1 "https://x-access-token:${TOKEN}@github.com/${OWNER}/${REPO}.git" data
          cd data
          dir="users/${U}"
          if [ -d "$dir" ]; then
            echo "$dir already exists — leaving it as-is."
            exit 0
          fi
          mkdir -p "$dir/notes"
          printf '# pantry.toml — what is physically on hand.\n# [[items]]\n# name = "..."\n' > "$dir/pantry.toml"
          printf '# preferences.toml — set your Kroger store before ordering.\n# [stores]\n# preferred_location = "<Kroger store name or id>"\n' > "$dir/preferences.toml"
          printf '# Per-tenant subjective overlay (rating + status), keyed by recipe slug.\n# Written by the agent; absent slug means effective status draft.\n' > "$dir/overlay.toml"
          printf '# Recipe notes live here as notes/<slug>.md.\n' > "$dir/notes/.gitkeep"
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add "$dir"
          git commit -m "Onboard ${U}: seed users/${U}/"
          git push

      - name: Allowlist + mint invite (KV)
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          U: ${{ inputs.username }}
          CODE: ${{ steps.code.outputs.value }}
        run: |
          npx --yes wrangler kv key put --binding=TENANT_KV --remote "tenant:${U}" "{\"id\":\"${U}\"}"
          npx --yes wrangler kv key put --binding=TENANT_KV --remote "invite:${CODE}" "${U}"

      - name: Summary
        run: |
          {
            echo "## Onboarded \`${{ inputs.username }}\`"
            echo ""
            echo "| | |"
            echo "|---|---|"
            echo "| Invite code | \`${{ steps.code.outputs.value }}\` |"
            echo "| Connector URL | \`https://<your-worker-host>/mcp\` |"
            echo ""
            echo "Send them the invite code + connector URL, and \`AGENT_INSTRUCTIONS.md\` to paste into their Claude.ai Project. They enter the code at \`/authorize\`, then run their Kroger consent at \`/oauth/init?tenant=${{ inputs.username }}\`."
            echo ""
            echo "> The invite code is visible in this run to anyone with repo access. For a trusted group that's fine; rotate it by re-running with a new code if needed."
          } >> "$GITHUB_STEP_SUMMARY"
