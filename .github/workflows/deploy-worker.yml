name: Deploy Worker

# CD for the grocery-mcp Worker (now at the repo root). Deploys on push to the
# worker sources. The Cloudflare API token is a GitHub Actions secret
# (CLOUDFLARE_API_TOKEN). The Worker's own secrets (GitHub App key, Kroger creds)
# are set once via `wrangler secret put` and persist across deploys — never here.

on:
  push:
    branches: [main]
    paths:
      - "src/**"
      - "wrangler.jsonc"
      - "tsconfig.json"
      - "package.json"
      - "package-lock.json"
  workflow_dispatch: {}

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-node@v6
        with:
          node-version: "22"

      - name: Install dependencies
        run: npm ci

      - name: Typecheck
        run: npm run typecheck

      - name: Test
        run: npm test

      - name: Deploy
        uses: cloudflare/wrangler-action@v4
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
